<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>

    <style>
         h1{ /*  Box-level */
            background-color: rgb(192, 252, 252);
            height: 300px;
            width: 300px;


            /*
            border-width: 10px;
            border-style: solid;
            border-color: rgb(22, 78, 60);
            */

            border: 10px solid rgb(22, 78, 60) ;

            /*margin: auto; = centralisa a caixa no centro da tela */

            /*
            margin-top: 20px;
            margin-right: 20px;
            margin-bottom: 40px;
            margin-left: 20px;
            */

            margin: 20px 20px 40px 20px;

            /*
            outline-width: 5px;
            outline-style: dashed;
            outline-color: blue;
            */

            outline: 5px dashed blue;
            
            
         }
         
         a{/* inline-level */
            /*
            border-width: 3px;
            border-style: solid;
            border-color: red;
            */

            border: 3px solid red;

            /*
            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            */

            padding: 10px ;
             
            /*
            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 10px;
            */

            margin: 10px ;
         }

    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
