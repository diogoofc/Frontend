<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/favicon.ico.png" type="image/x-icon">
    <title>Fonts Externas</title>

    <style>
        @font-face {
            font-family:'melting' ;
            src: url('fonts/Melting Ice.ttf') format(truetype);
            font-weight: normal;
            font-style: normal;
        }

        /*
        Tipos de format()
        - opentype(otf)
        - truetype(ttf)
        - embedded-opentype
        - truetype-aat (Apple Advanced
        typography)
        - svg
        */

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'melting', Times, serif;
            font-size: 3em
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Sit doloremque at eius quae consectetur enim deleniti veritatis velit blanditiis. Repellendus aut voluptas ab placeat nulla ipsum odio temporibus atque molestiae!</p>
</body>
</html>
