<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Listas</h1>
    
    <h2>Lista não ordenada</h2>

    <ul>
        <li>Café</li>
        <li>Enegetico</li>
        <li>Bolo de chocolate</li>
        <li>Cuador</li>
    </ul>

    <h2>Listas ordenada</h2>

    <ol>
        <li>Diogo</li>
        <li>Luan</li>
        <li>Roberto</li>
        <li>Ana</li>
    </ol>
</body>
</html>
